name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  static_checks:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v5
    - name: Static analysis
      run: make static

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v5
    - name: Install scylla-ccm
      run: pip3 install https://github.com/scylladb/scylla-ccm/archive/master.zip
    - name: CCM tests
      run: make ccm-tests
    - name: Tests
      run: make test