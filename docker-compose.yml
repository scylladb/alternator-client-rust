networks:
  default:
    name: scylla_network
services:
  scylla_node:
    image: scylladb/scylla
    container_name: scylla_node
    command: |
      --smp 1
      --memory 1G
      --developer-mode 1
      --overprovisioned 1
      --alternator-write-isolation always
      --listen-address scylla_node
      --rpc-address scylla_node
      --alternator-port 8000
      --seeds scylla_node
      --alternator-response-gzip-compression-level 6
      --alternator-response-compression-threshold-in-bytes 1
    ports:
      - "9042:9042"
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "cqlsh", "scylla_node", "-e", "select * from system.local WHERE key='local'" ]
      interval: 5s
      timeout: 5s
      retries: 60